<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Tránsito - Uruguay</title>
    <style>
        :root { --primary: #1a252f; --accent: #d35400; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eef2f3; padding-top: 85px; }
        
        /* Cabecera */
        .header { position: fixed; top: 0; width: 100%; background: var(--primary); padding: 12px; box-sizing: border-box; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #buscador { width: 100%; padding: 14px; font-size: 18px; border-radius: 8px; border: none; outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        #status { color: #ecf0f1; font-size: 12px; text-align: center; margin-top: 6px; font-weight: bold; }

        /* Contenedor de Artículos */
        .contenedor { padding: 12px; max-width: 750px; margin: auto; }
        .articulo-card { 
            background: white; margin-bottom: 12px; padding: 18px; 
            border-radius: 10px; border-left: 6px solid var(--accent);
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s ease;
        }
        .articulo-card h2 { margin: 0 0 8px 0; font-size: 1.1em; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; text-transform: uppercase; }
        .articulo-card p { margin: 0; line-height: 1.6; color: #333; font-size: 1.05em; white-space: pre-wrap; }
        
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="buscador" placeholder="🔎 Buscar (ej: luces, alcohol, 13.1)..." disabled>
    <div id="status">Leyendo reg2.txt...</div>
</div>

<div class="contenedor" id="visor">
    <div style="text-align:center; padding:50px; color:#7f8c8d;">Procesando reglamento...</div>
</div>

<script>
    const visor = document.getElementById('visor');
    const inputBusqueda = document.getElementById('buscador');
    const status = document.getElementById('status');

    // 1. CARGAR EL ARCHIVO TXT
    fetch('reg2.txt')
        .then(response => {
            if (!response.ok) throw new Error("No se encontró reg2.txt");
            return response.text();
        })
        .then(texto => {
            visor.innerHTML = '';
            
            // Separamos el texto cada vez que encuentre un número de artículo al inicio de línea o la palabra Art.
            // Esto divide el archivo largo en piezas individuales
            const bloques = texto.split(/(?=Art\.|\n\d+\.\d+)/gi);

            let totalCargados = 0;

            bloques.forEach(bloque => {
                if (bloque.trim().length > 10) {
                    const lineas = bloque.trim().split('\n');
                    const titulo = lineas[0].substring(0, 40); // Toma el inicio como título
                    const contenido = bloque.trim();

                    const card = document.createElement('div');
                    card.className = 'articulo-card';
                    card.innerHTML = `<h2>${titulo}...</h2><p>${contenido}</p>`;
                    visor.appendChild(card);
                    totalCargados++;
                }
            });

            inputBusqueda.disabled = false;
            inputBusqueda.placeholder = "🔎 Escribe palabra clave...";
            status.innerText = `${totalCargados} secciones listas para buscar`;
        })
        .catch(err => {
            visor.innerHTML = `<div class='articulo-card'><h2>Error</h2><p>No se pudo cargar 'reg2.txt'. Verifica que el nombre sea exacto en GitHub.</p></div>`;
            status.innerText = "Error al conectar.";
        });

    // 2. BUSCADOR INSTANTÁNEO
    inputBusqueda.addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        const tarjetas = document.querySelectorAll('.articulo-card');
        let encontrados = 0;

        tarjetas.forEach(t => {
            const contenido = t.innerText.toLowerCase();
            if (contenido.includes(query)) {
                t.classList.remove('hidden');
                encontrados++;
            } else {
                t.classList.add('hidden');
            }
        });

        status.innerText = query === "" ? "Mostrando todo" : `${encontrados} resultados encontrados`;
    });
</script>

</body>
</html>
