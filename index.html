<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Reglamento Nacional</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .resultado { border-bottom: 1px solid #eee; padding: 10px 0; }
        .art { font-weight: bold; color: #d32f2f; }
        .desc { color: #333; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Buscador de Tránsito</h2>
        <input type="text" id="buscador" placeholder="Ej: casco, alcohol, luces, art 4.2..." onkeyup="buscar()">
        <div id="lista-resultados"></div>
    </div>

    <script>
        // Datos extraídos del Reglamento Nacional de Circulación Vial
        const reglamento = [
            { art: "Art. 4.1", desc: "Obligación de llevar documentos (licencia, empadronamiento) y exhibirlos ante la autoridad." },
            { art: "Art. 4.2.1", desc: "Prohibición de conducir en estado de ebriedad o bajo efectos de drogas." },
            { art: "Art. 4.3", desc: "Respetar señalamientos e indicaciones del personal de fiscalización (detención inmediata)." },
            { art: "Art. 4.4", desc: "Prohibición de conducir vehículos o animales con imprudencia o descuido." },
            { art: "Art. 6.1.1", desc: "Ancho máximo permitido: 2,60 metros." },
            { art: "Art. 7.1", desc: "Requisitos de luces delanteras (blanca/amarilla) y alcance de luz alta (100m) y baja (30m)." },
            { art: "Art. 10.13", desc: "Obligación de portar las dos placas de matrícula legibles y visibles." },
            { art: "Art. 13.5", desc: "Prohibición de circular a una velocidad tan lenta que obstaculice el tránsito normal." },
            { art: "Art. 18.2", desc: "Prohibiciones de estacionamiento: doble fila, intersecciones, cruces peatonales, puentes, etc." },
            { art: "Art. 21.3.1", desc: "Uso obligatorio de casco protector para conductores y acompañantes de motos." },
            { art: "Art. 27.4", desc: "Infracción por negativa a firmar el Acta de Constatación de Infracción (ACI)." },
            { art: "Art. 27.20", desc: "Facultad de INCAUTACIÓN del vehículo por la autoridad competente." }
            // Se pueden seguir agregando más artículos del PDF aquí
        ];

        function buscar() {
            const termino = document.getElementById('buscador').value.toLowerCase();
            const lista = document.getElementById('lista-resultados');
            lista.innerHTML = '';

            if (termino.length < 2) return;

            const filtrados = reglamento.filter(item => 
                item.art.toLowerCase().includes(termino) || 
                item.desc.toLowerCase().includes(termino)
            );

            filtrados.forEach(item => {
                const div = document.createElement('div');
                div.className = 'resultado';
                div.innerHTML = `<div class="art">${item.art}</div><div class="desc">${item.desc}</div>`;
                lista.appendChild(div);
            });
        }
    </script>
</body>
</html>
