<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador - Reglamento Nacional de Circulación Vial</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .search-container {
            margin-bottom: 30px;
            text-align: center;
        }
        #searchInput {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #3498db;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
        }
        #searchInput:focus {
            border-color: #2980b9;
        }
        .articulo {
            background: #fff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: block;
        }
        .articulo h3 {
            margin-top: 0;
            color: #e67e22;
        }
        .articulo p {
            margin-bottom: 0;
        }
        .hidden {
            display: none;
        }
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>📚 Buscador del Reglamento Vial</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Escribe para buscar (ej: licencias, velocidad, luces)..." onkeyup="buscarArticulo()">
    </div>

    <div id="listaArticulos">
        </div>

    <script>
        // Base de datos de ejemplo basada en el reglamento
        const datosReglamento = [
            { titulo: "Título II - Licencias de Conducir", contenido: "Es obligatorio poseer una licencia vigente para conducir vehículos. Categorías A, B, C, D, F, G según peso y pasajeros." },
            { titulo: "Capítulo IV - Alcohol y Drogas", contenido: "Está prohibido conducir bajo los efectos del alcohol o sustancias psicoactivas que disminuyan la aptitud." },
            { titulo: "Capítulo VI - Dimensiones de Vehículos", contenido: "Ancho máximo 2,60m. Altura máxima general 4,10m. Longitud varía según el tipo de camión o remolque." },
            { titulo: "Capítulo VII - Luces Obligatorias", contenido: "Uso de luces bajas, altas, de posición, freno e indicadores de giro. Luces blancas o amarillas adelante." },
            { titulo: "Capítulo XII - Ubicación en Calzada", contenido: "Se debe circular por la derecha. En varias sendas, los vehículos lentos ocuparán la senda de la derecha." },
            { titulo: "Capítulo XIII - Velocidades", contenido: "Límites de velocidad establecidos según la zona (urbana o carretera) y el tipo de vehículo." },
            { titulo: "Título IV - Peatones", contenido: "Deben circular por las aceras y cruzar por las esquinas o zonas señalizadas (cebras)." },
            { titulo: "Título X - Infracciones y Multas", contenido: "Clasificación de faltas en Grado 1, 2 y 3. Sanciones por exceso de velocidad, falta de documentos o fallas mecánicas." },
            { titulo: "Capítulo VIII - Frenos", contenido: "Todo vehículo debe poseer un sistema de frenos de servicio y un freno de estacionamiento (freno de mano)." }
        ];

        const listaDiv = document.getElementById('listaArticulos');

        // Función para cargar los artículos inicialmente
        function cargarArticulos() {
            listaDiv.innerHTML = '';
            datosReglamento.forEach(art => {
                const div = document.createElement('div');
                div.className = 'articulo';
                div.innerHTML = `<h3>${art.titulo}</h3><p>${art.contenido}</p>`;
                listaDiv.appendChild(div);
            });
        }

        // Función de búsqueda por coincidencia
        function buscarArticulo() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const articulos = document.getElementsByClassName('articulo');

            for (let i = 0; i < articulos.length; i++) {
                const texto = articulos[i].innerText.toLowerCase();
                if (texto.includes(input)) {
                    articulos[i].classList.remove('hidden');
                } else {
                    articulos[i].classList.add('hidden');
                }
            }
        }

        // Inicializar
        cargarArticulos();
    </script>

</body>
</html>
