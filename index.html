fetch('reglamento.txt')
    .then(response => response.text())
    .then(text => {
        const lineas = text.split('\n');
        lineas.forEach(linea => {
            if(linea.trim().length > 10) {
                const [titulo, ...resto] = linea.split(':');
                crearTarjeta(titulo, resto.join(':'));
            }
        });
    });
